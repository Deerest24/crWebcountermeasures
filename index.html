<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Climate Resilience Countermeasures</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header">
    <div class="header-left">
      <h1>Climate Resilience Countermeasures</h1>
      <p id="location-display">Enter your location to get started</p>
    </div>
    <button id="export-btn" class="export-btn" disabled>↓ Export CSV</button>
  </header>

  <main class="layout">

    <!-- ===== LEFT: Input Form ===== -->
    <aside class="form-panel">

      <section class="form-section">
        <h2>Location</h2>
        <div class="input-stack">
          <input type="text" id="county"  placeholder="County"          autocomplete="off">
          <input type="text" id="state"   placeholder="State / Province" autocomplete="off">
          <input type="text" id="country" placeholder="Country"          autocomplete="off">
        </div>
      </section>

      <section class="form-section">
        <h2>Applicable Hazard Types</h2>
        <label class="check-item select-all-row">
          <input type="checkbox" id="allHazards">
          <span>Select all</span>
        </label>
        <div id="hazard-list"></div>
      </section>

      <section class="form-section">
        <h2>Counteraction</h2>

        <div class="ca-field">
          <label class="ca-field-label" for="ca-title">Action title</label>
          <input type="text" class="ca-input" id="ca-title"
                 placeholder="e.g. Prepare emergency kit" autocomplete="off">
        </div>

        <div class="ca-field">
          <label class="ca-field-label" for="ca-desc">Description</label>
          <textarea class="ca-textarea" id="ca-desc"
                    placeholder="Describe the counteraction steps…"></textarea>
        </div>

        <div class="ca-field">
          <label class="ca-field-label">Relevant links</label>
          <div id="links-container"></div>
          <button type="button" id="add-link-btn" class="add-link-btn">+ Add link</button>
        </div>

        <div class="ca-field">
          <label class="ca-field-label">Target groups</label>
          <div class="target-grid" id="target-grid"></div>
          <div class="custom-tag-row">
            <input type="text" id="custom-tag-input" class="ca-input"
                   placeholder="Add custom tag…" autocomplete="off" maxlength="40">
            <button type="button" id="add-tag-btn" class="add-tag-btn">Add</button>
          </div>
          <div id="custom-tags"></div>
        </div>

      </section>

      <section class="form-section">
        <h2>Phase</h2>
        <div id="phase-list"></div>
      </section>

    </aside>

    <!-- ===== RIGHT: Card Visualization ===== -->
    <section class="viz-panel">
      <div id="cards-container">
        <div class="empty-state" id="empty-state">
          <div class="empty-icon">🌍</div>
          <p>Select hazard types and enter a counteraction<br>to build your resilience card</p>
        </div>
      </div>
    </section>

  </main>

  <script src="script.js"></script>
</body>
</html>
