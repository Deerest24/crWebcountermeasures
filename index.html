<!DOCTYPE html>
<html>
<head>
    <title>webCountermeasuresForm</title>
    <link rel="stylesheet" href="style.css"> 
</head>
<body>
    <h1>Build your climate resilience</h1>
    <script src="script.js"></script> 

<h3>Select location:</h3>
 <form id="location">
        <label for="county">County:</label><br>
        <input type="text" id="county" name="county"><br>
        <label for="state">State:</label><br>
        <input type="text" id="state" name="state">
        <label for="country">Country:</label><br>
        <input type="text" id="country" name="country"><br>
</form>

<h3>Select hazard type(s):</h3><!--potentially smart sort by location and know main hazards-->
 <form id="hazardType">
        <input type="checkbox" id="allHazardTypes" name="allHazardTypes" value="allHazardTypes"><br>
         <label for="allHazardTypes">All</label><br><!--if selected mark all as selected-->
        <input type="checkbox" id="hazardType1" name="hazardType1" value="Earthquake"><br>
         <label for="hazardType1">Earthquake</label><br>
        <input type="checkbox" id="hazardType2" name="hazardType2" value="Flooding"><br>
         <label for="hazardType2">Flooding</label><br>
        <input type="checkbox" id="hazardType3" name="hazardType3" value="Heatwaves"><br>
         <label for="hazardType3">Heat waves</label><br>
        <input type="checkbox" id="hazardType4" name="hazardType4" value="Landslide"><br>
         <label for="hazardType4">Landslide</label><br>
         <input type="checkbox" id="hazardType5" name="hazardType5" value="Tornado"><br>
         <label for="hazardType5">Tornado</label><br>
         <input type="checkbox" id="hazardType6" name="hazardType6" value="Tsunami"><br>
         <label for="hazardType6">Tsunami</label><br>
        <input type="checkbox" id="hazardType7" name="hazardType7" value="storm"><br>
         <label for="hazardType7">Storm</label><br>
        <input type="checkbox" id="hazardType8" name="hazardType8" value="Wildfire"><br>
         <label for="hazardType8">Wildfire</label><br>
</form>
<h3>Add counteractions:</h3>
 <form id="countermeasures">
        <label for="actiontotake">Action title:</label><br>
        <input type="text" id="actiontitle" name="actiontitle"><br>
        <label for="actionDescription">Action Descrption:</label><br>
        <input type="text" id="actionDescription" name="actionDescription">
        <label for="actionLinks">Relevant link(s):</label><br><!--allow multiple-->
        <input type="url" id="actionLinks" name="actionLinks"><br>
        <input type="checkbox" id="targetGroup" name="targetGroup" value="allTargetGroups"><br>
         <label for="allTargetGroups">All</label><br><!--if selected mark all as selected-->
        <input type="checkbox" id="targetGroup1" name="targetGroup1" value="adults"><br>
         <label for="targetGroup1">Adults</label><br>
        <input type="checkbox" id="targetGroup2" name="targetGroup2" value="children"><br>
         <label for="targetGroup2">Children</label><br>
        <input type="checkbox" id="targetGroup3" name="targetGroup3" value="petOwner"><br>
         <label for="targetGroup3">Pet Owners</label><br>
        <input type="checkbox" id="targetGroup4" name="targetGroup4" value="propertyOwner"><br>
         <label for="targetGroup4">Property Owners</label><br>
</form>
</body>
</html>
